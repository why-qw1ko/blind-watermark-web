version: '3.8'

services:
  app:
    build: .
    restart: always
    environment:
      - PORT=8000
    ports:
      - "8000:8000"

  nginx:
    image: nginx:stable
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt
    depends_on:
      - app
